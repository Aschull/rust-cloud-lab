name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instala Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependências
        uses: Swatinem/rust-cache@v2

      - name: Roda unit tests
        run: cargo test --lib
